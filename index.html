<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Question</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-family:sans-serif;
background:#ffeef2;
overflow:hidden;
}

h1{
font-size:40px;
margin-bottom:40px;
}

.container{
position:relative;
width:500px;
height:300px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
}

#yes{
background:#ff4d6d;
color:white;
position:absolute;
left:120px;
}

#no{
position:absolute;
background:#444;
color:white;
left:300px;
top:120px;
transition:0.15s linear;
}

.heart{
position:absolute;
font-size:30px;
animation:float 2s linear forwards;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-400px);
opacity:0;
}
}

</style>
</head>

<body>

<h1>나 좋아해?</h1>

<div class="container" id="container">

<button id="yes">예 ❤️</button>
<button id="no">아니요</button>

</div>

<script>

const noBtn=document.getElementById("no")

document.addEventListener("mousemove",(e)=>{

const rect=noBtn.getBoundingClientRect()

const btnX=rect.left+rect.width/2
const btnY=rect.top+rect.height/2

const dx=e.clientX-btnX
const dy=e.clientY-btnY

const distance=Math.sqrt(dx*dx+dy*dy)

if(distance<120){

const moveX=-dx*0.8
const moveY=-dy*0.8

const currentLeft=noBtn.offsetLeft
const currentTop=noBtn.offsetTop

noBtn.style.left=currentLeft+moveX+"px"
noBtn.style.top=currentTop+moveY+"px"

}

})

document.getElementById("yes").onclick=()=>{

for(let i=0;i<30;i++){

const heart=document.createElement("div")

heart.innerHTML="❤️"

heart.className="heart"

heart.style.left=Math.random()*window.innerWidth+"px"

heart.style.top=window.innerHeight+"px"

heart.style.fontSize=Math.random()*40+20+"px"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},2000)

}

setTimeout(()=>{
alert("나도 좋아해 😆❤️")
},500)

}

</script>

</body>
</html>
