<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Question</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-family:sans-serif;
background:#ffeef2;
overflow:hidden;
}

h1{
font-size:40px;
margin-bottom:40px;
}

.container{
position:relative;
width:500px;
height:300px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
}

#yes{
background:#ff4d6d;
color:white;
position:absolute;
left:120px;
top:120px;
transition:0.2s;
}

#no{
position:absolute;
background:#444;
color:white;
left:300px;
top:120px;
transition:0.15s linear;
}

#result{
display:none;
justify-content:center;
align-items:center;
height:100vh;
}

img{
width:350px;
border-radius:20px;
}

.heart{
position:absolute;
color:red;
font-size:24px;
animation:explode 1s forwards;
}

@keyframes explode{

0%{
transform:scale(1);
opacity:1;
}

100%{
transform:translate(var(--x),var(--y)) scale(2);
opacity:0;
}

}

</style>
</head>

<body>

<div id="question">

<h1>나랑 결혼할래?</h1>

<div class="container">

<button id="yes">예 ❤️</button>
<button id="no">아니요</button>

</div>

</div>

<div id="result">

<img src="cat.jpg">

</div>

<script>

const noBtn=document.getElementById("no")
const yesBtn=document.getElementById("yes")

let yesScale=1

document.addEventListener("mousemove",(e)=>{

const rect=noBtn.getBoundingClientRect()

const btnX=rect.left+rect.width/2
const btnY=rect.top+rect.height/2

const dx=e.clientX-btnX
const dy=e.clientY-btnY

const distance=Math.sqrt(dx*dx+dy*dy)

if(distance<120){

const moveX=-dx*0.8
const moveY=-dy*0.8

noBtn.style.left=noBtn.offsetLeft+moveX+"px"
noBtn.style.top=noBtn.offsetTop+moveY+"px"

yesScale+=0.05
yesBtn.style.transform="scale("+yesScale+")"

}

})

yesBtn.onclick=()=>{

for(let i=0;i<40;i++){

const heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=(window.innerWidth/2)+"px"
heart.style.top=(window.innerHeight/2)+"px"

const x=(Math.random()*800-400)+"px"
const y=(Math.random()*600-300)+"px"

heart.style.setProperty("--x",x)
heart.style.setProperty("--y",y)

document.body.appendChild(heart)

}

document.getElementById("question").style.display="none"
document.getElementById("result").style.display="flex"

}

</script>

</body>
</html>
