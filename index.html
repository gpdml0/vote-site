<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Question</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-family:sans-serif;
background:#ffeef2;
overflow:hidden;
}

h1{
font-size:40px;
margin-bottom:40px;
}

.container{
position:relative;
width:500px;
height:300px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
}

#yes{
background:#ff4d6d;
color:white;
position:absolute;
left:120px;
}

#no{
position:absolute;
background:#444;
color:white;
left:300px;
top:120px;
transition:0.15s linear;
}

#result{
display:none;
flex-direction:column;
align-items:center;
}

img{
width:300px;
margin-top:20px;
border-radius:20px;
}

</style>
</head>

<body>

<div id="question">

<h1>나랑 결혼할래?</h1>

<div class="container">

<button id="yes">예 ❤️</button>
<button id="no">아니요</button>

</div>

</div>

<div id="result">

<h1>헤헤 결혼이다 ❤️</h1>

<img src="cat.jpg">

</div>

<script>

const noBtn=document.getElementById("no")

document.addEventListener("mousemove",(e)=>{

const rect=noBtn.getBoundingClientRect()

const btnX=rect.left+rect.width/2
const btnY=rect.top+rect.height/2

const dx=e.clientX-btnX
const dy=e.clientY-btnY

const distance=Math.sqrt(dx*dx+dy*dy)

if(distance<120){

const moveX=-dx*0.8
const moveY=-dy*0.8

const currentLeft=noBtn.offsetLeft
const currentTop=noBtn.offsetTop

noBtn.style.left=currentLeft+moveX+"px"
noBtn.style.top=currentTop+moveY+"px"

}

})

document.getElementById("yes").onclick=()=>{

document.getElementById("question").style.display="none"

document.getElementById("result").style.display="flex"

}

</script>

</body>
</html>
