<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Question</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-family:sans-serif;
background:#ffeef2;
overflow:hidden;
}

h1{
font-size:40px;
margin-bottom:40px;
}

.container{
position:relative;
width:400px;
height:200px;
display:flex;
justify-content:center;
align-items:center;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

#yes{
background:#ff4d6d;
color:white;
margin-right:20px;
}

#no{
position:absolute;
background:#444;
color:white;
left:200px;
}

.heart{
position:absolute;
font-size:30px;
animation:float 2s linear forwards;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-300px);
opacity:0;
}
}

</style>
</head>

<body>

<h1>나 좋아해?</h1>

<div class="container">

<button id="yes">예 ❤️</button>

<button id="no">아니요</button>

</div>

<script>

const noBtn=document.getElementById("no")

function moveButton(){

const x=Math.random()*300
const y=Math.random()*150

noBtn.style.left=x+"px"
noBtn.style.top=y+"px"

let size=noBtn.offsetWidth

if(size>40){
noBtn.style.transform="scale("+(Math.random()*0.5+0.5)+")"
}

}

noBtn.addEventListener("mouseover",moveButton)
noBtn.addEventListener("touchstart",moveButton)

document.getElementById("yes").onclick=()=>{

for(let i=0;i<20;i++){

const heart=document.createElement("div")

heart.innerHTML="❤️"

heart.className="heart"

heart.style.left=Math.random()*window.innerWidth+"px"

heart.style.top=window.innerHeight+"px"

heart.style.fontSize=Math.random()*30+20+"px"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},2000)

}

setTimeout(()=>{
alert("나도 좋아해 😆❤️")
},500)

}

</script>

</body>
</html>
