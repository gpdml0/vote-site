<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>질문</title>

<style>
body{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  font-family:sans-serif;
}

.container{
  position:relative;
  width:400px;
  height:200px;
}

button{
  padding:10px 20px;
  font-size:18px;
  cursor:pointer;
}

#yes{
  margin-right:20px;
}

#no{
  position:absolute;
  left:200px;
}
</style>
</head>

<body>

<h1>나 좋아해?</h1>

<div class="container">
  <button id="yes">예</button>
  <button id="no">아니요</button>
</div>

<script>
const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", () => {
  const x = Math.random() * 300;
  const y = Math.random() * 150;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});

document.getElementById("yes").onclick = () => {
  alert("나도 좋아해 😆");
};
</script>

</body>
</html>
