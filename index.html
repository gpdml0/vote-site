<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Question</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-family:sans-serif;
background:#ffeef2;
overflow:hidden;
}

h1{
font-size:40px;
margin-bottom:40px;
}

.container{
position:relative;
width:500px;
height:300px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

#yes{
background:#ff4d6d;
color:white;
position:absolute;
left:120px;
}

.no{
position:absolute;
background:#444;
color:white;
left:300px;
}

.heart{
position:absolute;
font-size:30px;
animation:float 2s linear forwards;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-400px);
opacity:0;
}
}

.shake{
animation:shake 0.2s;
}

@keyframes shake{
0%{transform:translate(0)}
25%{transform:translate(-5px)}
50%{transform:translate(5px)}
75%{transform:translate(-5px)}
100%{transform:translate(0)}
}

</style>
</head>

<body>

<h1>나 좋아해?</h1>

<div class="container" id="container">

<button id="yes">예 ❤️</button>

<button class="no">아니요</button>

</div>

<script>

const container=document.getElementById("container")

function moveButton(btn){

const x=Math.random()*400
const y=Math.random()*250

btn.style.left=x+"px"
btn.style.top=y+"px"

btn.style.transform="scale("+(Math.random()*0.6+0.4)+")"

document.body.classList.add("shake")

setTimeout(()=>{
document.body.classList.remove("shake")
},200)

if(document.querySelectorAll(".no").length<6){

if(Math.random()>0.6){

const clone=btn.cloneNode(true)

container.appendChild(clone)

addEvents(clone)

}

}

}

function addEvents(btn){

btn.addEventListener("mouseover",()=>moveButton(btn))

btn.addEventListener("touchstart",()=>moveButton(btn))

}

document.querySelectorAll(".no").forEach(addEvents)

document.getElementById("yes").onclick=()=>{

for(let i=0;i<40;i++){

const heart=document.createElement("div")

heart.innerHTML="❤️"

heart.className="heart"

heart.style.left=Math.random()*window.innerWidth+"px"

heart.style.top=window.innerHeight+"px"

heart.style.fontSize=Math.random()*40+20+"px"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},2000)

}

setTimeout(()=>{
alert("나도 좋아해 😆❤️")
},500)

}

</script>

</body>
</html>
